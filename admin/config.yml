# ============================================================
#  Sierra Functional Medicine — editor settings
#  You only need to change the two lines marked "CHANGE THIS".
# ============================================================

backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/sierra-site      # CHANGE THIS to your GitHub username + repo
  branch: main
  base_url: https://YOUR-SITE-ADDRESS         # CHANGE THIS to your live site address (e.g. https://sierra-site.pages.dev)

# Where uploaded images would go (not used yet, but required)
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# The friendly boxes Babak sees when he logs in
collections:
  - name: "content"
    label: "Website text"
    delete: false
    files:
      - name: "general"
        label: "Text you can edit"
        file: "content/content.json"
        fields:
          - { label: "Homepage subheading", name: "hero_sub", widget: "text" }
          - { label: "Phone number", name: "phone", widget: "string" }
          - { label: "Address — line 1", name: "address1", widget: "string" }
          - { label: "Address — line 2", name: "address2", widget: "string" }
          - { label: "Office hours", name: "hours", widget: "string" }
          - { label: "Contact page intro", name: "contact_intro", widget: "text" }
          - { label: "Fee — under 65 (number only)", name: "fee_u65", widget: "string" }
          - { label: "Fee — 65 and over (number only)", name: "fee_o65", widget: "string" }
          - { label: "About — paragraph 1", name: "bio1", widget: "text" }
          - { label: "About — paragraph 2", name: "bio2", widget: "text" }
          - { label: "About — paragraph 3", name: "bio3", widget: "text" }
